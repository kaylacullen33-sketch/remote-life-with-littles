<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remote Life With Littles</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#F5F7FA;
color:#2D2D2D;
}

header{
background:#4A6FA5;
color:white;
text-align:center;
padding:45px 20px;
}

header h1{
margin:0;
font-size:34px;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.section-title{
text-align:center;
font-size:28px;
margin-bottom:25px;
}

.jobs{
display:grid;
grid-template-columns:1fr;
gap:22px;
}

.job{
background:white;
padding:28px;
border-radius:14px;
box-shadow:0 6px 18px rgba(74,111,165,0.10);
text-align:center;
border:1px solid #e7edf5;
}

.job h3{
margin-top:0;
font-size:26px;
}

.company{
color:#4A6FA5;
font-weight:bold;
margin-bottom:8px;
}

.job-meta{
color:#5b6675;
margin-bottom:10px;
}

.posted{
font-size:14px;
color:#7b8795;
margin-bottom:12px;
}

.status{
display:inline-block;
background:#7FB069;
color:white;
padding:6px 14px;
border-radius:20px;
font-size:12px;
margin-bottom:12px;
}

.apply{
display:inline-block;
padding:12px 24px;
background:#4A6FA5;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

footer{
text-align:center;
margin-top:40px;
padding:25px;
color:#6b7280;
}

@media (min-width:700px){
.jobs{
grid-template-columns:1fr 1fr;
}
}

</style>
</head>

<body>

<header>
<h1>Remote Life With Littles</h1>
<p>Helping parents find legitimate remote jobs.</p>
</header>

<div class="container">

<h2 class="section-title">Today's Remote Job Postings</h2>
<div id="todayJobs" class="jobs"></div>

<h2 class="section-title" style="margin-top:50px;">All Open Jobs</h2>
<div id="openJobs" class="jobs"></div>

</div>

<footer>
<p>© 2026 Remote Life With Littles</p>
</footer>

<script>

/* ==========================
   EASY JOB LIST (EDIT HERE)
   ========================== */

const jobs = [

{
title: "Customer Support Representative",
company: "Example Company",
type: "Remote | Full Time",
postedDate: "2026-03-13",
status: "open",
link: "#"
},

{
title: "Chat Support Agent",
company: "Support Co",
type: "Remote | Work From Home",
postedDate: "2026-03-13",
status: "open",
link: "#"
},

{
title: "Data Entry Specialist",
company: "Data Services",
type: "Remote | Entry Level",
postedDate: "2026-03-12",
status: "open",
link: "#"
},

{
title: "Account Manager",
company: "Growth Partners",
type: "Remote | Full Time",
postedDate: "2026-03-11",
status: "open",
link: "#"
},

{
title: "IT Support Specialist",
company: "Tech Help Desk",
type: "Remote | Full Time",
postedDate: "2026-03-09",
status: "closed",
link: "#"
}

];


/* ==========================
   AUTOMATIC WEBSITE LOGIC
   ========================== */

const today = new Date().toISOString().split("T")[0];

const todayContainer = document.getElementById("todayJobs");
const openContainer = document.getElementById("openJobs");

function createJobCard(job){

return `
<div class="job">

<div class="status">Open</div>

<h3>${job.title}</h3>

<div class="company">${job.company}</div>

<p class="job-meta">${job.type}</p>

<p class="posted">Posted: ${job.postedDate}</p>

<a class="apply" href="${job.link}" target="_blank">Apply Here</a>

</div>
`;

}

const openJobs = jobs.filter(job => job.status === "open");
const todayJobs = openJobs.filter(job => job.postedDate === today);

todayContainer.innerHTML = todayJobs.map(createJobCard).join("");

openContainer.innerHTML = openJobs.map(createJobCard).join("");

</script>

</body>
</html>
